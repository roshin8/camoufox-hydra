name: Build Camoufox Hydra

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: macos
            arch: arm64
            os: macos-15
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      BUILD_TARGET: ${{ matrix.target }},${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | bash -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install aria2 nasm

      - name: Set up sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Prioritize action's sccache
        run: echo "$(dirname $SCCACHE_PATH)" >> $GITHUB_PATH

      - name: Fetch source
        run: make fetch

      - name: Setup source
        run: make setup-minimal

      - name: Prepare and patch
        run: |
          python3 scripts/fix-mach-logging.py firefox-src
          BUILD_TARGET=${{ matrix.target }},${{ matrix.arch }} make dir

      - name: Build
        run: make build

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Verify build
        run: |
          ls -la firefox-src/obj-*/dist/bin/camoufox* || true
          grep "setCanvasSeed" firefox-src/dom/webidl/Window.webidl && echo "C++ API: FOUND" || echo "C++ API: NOT FOUND"

      - name: Package
        run: |
          mkdir -p dist
          cp -r firefox-src/obj-*/dist/bin/* dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camoufox-hydra-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/*
