name: Build Camoufox Hydra

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-26
    env:
      SCCACHE_GHA_ENABLED: "true"
      BUILD_TARGET: macos,arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | bash -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          brew install aria2 nasm lld cbindgen
          echo "$(brew --prefix lld)/bin" >> $GITHUB_PATH

      - name: Set up sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Prioritize action's sccache
        run: echo "$(dirname $SCCACHE_PATH)" >> $GITHUB_PATH

      - name: Fetch and setup
        run: |
          make fetch
          make setup-minimal

      - name: Patch and configure
        run: |
          make dir
          python3 scripts/fix-mach-logging.py firefox-src
          echo "ac_add_options --with-ccache=$SCCACHE_PATH" >> firefox-src/mozconfig

      - name: Build
        run: make build

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Verify
        run: |
          ls -la firefox-src/obj-*/dist/bin/camoufox* || true
          grep "setCanvasSeed" firefox-src/dom/webidl/Window.webidl && echo "C++ API: FOUND" || echo "C++ API: NOT FOUND"

      - name: Package
        run: |
          cd firefox-src && ./mach package
          # Find the app from mach package output
          APP_PATH=$(find obj-*/dist -name "*.app" -maxdepth 2 | head -1)
          # Create DMG with UDZO (Finder-compatible) preserving code signatures
          mkdir -p /tmp/dmg-staging
          cp -R "$APP_PATH" /tmp/dmg-staging/
          ln -s /Applications /tmp/dmg-staging/Applications
          mkdir -p ../dist
          hdiutil create -volname "Camoufox" \
            -srcfolder /tmp/dmg-staging \
            -ov -format UDZO \
            ../dist/Camoufox.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camoufox-hydra-macos-arm64
          path: dist/Camoufox.dmg

  build-linux:
    runs-on: ubuntu-24.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      BUILD_TARGET: linux,x86_64

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18 clang-18
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | bash -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y msitools p7zip-full aria2 nasm \
            libasound2-dev libgtk-3-dev libdbus-glib-1-dev libpulse-dev \
            libx11-xcb-dev libxt-dev libxrandr-dev libxcomposite-dev libxdamage-dev \
            libclang-dev
          cargo install cbindgen

      - name: Set up git identity
        run: |
          git config --global user.email "ci@camoufox-hydra"
          git config --global user.name "Camoufox Hydra CI"

      - name: Set up sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Prioritize action's sccache
        run: echo "$(dirname $SCCACHE_PATH)" >> $GITHUB_PATH

      - name: Fetch and setup
        run: |
          make fetch
          make setup-minimal

      - name: Patch and configure
        run: |
          make dir
          python3 scripts/fix-mach-logging.py firefox-src
          echo "ac_add_options --with-ccache=$SCCACHE_PATH" >> firefox-src/mozconfig

      - name: Create swap space
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build
        run: make build

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Verify
        run: |
          ls -la firefox-src/obj-*/dist/bin/camoufox* || true
          grep "setCanvasSeed" firefox-src/dom/webidl/Window.webidl && echo "C++ API: FOUND" || echo "C++ API: NOT FOUND"

      - name: Package
        run: cd firefox-src && ./mach package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camoufox-hydra-linux-x86_64
          path: firefox-src/obj-*/dist/*.tar.bz2

  release:
    needs: [build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
