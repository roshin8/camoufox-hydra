name: Build Camoufox Hydra

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18 clang-18
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | bash -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y msitools p7zip-full aria2 nasm cbindgen \
            libstdc++-14-dev libgtk-3-dev libdbus-glib-1-dev \
            libpulse-dev libasound2-dev libx11-xcb-dev libxt-dev \
            libxrandr-dev libxcomposite-dev libxdamage-dev

      - name: Set up git identity
        run: |
          git config --global user.email "ci@camoufox-hydra"
          git config --global user.name "Camoufox Hydra CI"

      - name: Fetch Firefox source
        run: make fetch

      - name: Setup source
        run: make setup

      - name: Fix mach logging bug
        run: |
          python3 -c "
          content = open('firefox-src/python/mach/mach/logging.py').read()
          old = '        formatted_msg = record.msg.format(**getattr(record, \"params\", {}))'
          new = '        try:\n            formatted_msg = record.msg.format(**getattr(record, \"params\", {}))\n        except (KeyError, ValueError, IndexError):\n            formatted_msg = record.msg'
          content = content.replace(old, new)
          open('firefox-src/python/mach/mach/logging.py', 'w').write(content)
          "

      - name: Apply patches
        run: make patch

      - name: Copy additions and config
        run: |
          make additions
          make config

      - name: Write Linux mozconfig
        run: cp mozconfig.linux firefox-src/mozconfig

      - name: Build extension
        run: make extension

      - name: Create swap space
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build Firefox
        run: cd firefox-src && ./mach build

      - name: Verify build
        run: |
          ls -la firefox-src/obj-*/dist/bin/camoufox* || true
          echo "=== Checking C++ APIs ==="
          grep "setCanvasSeed" firefox-src/dom/webidl/Window.webidl || echo "setCanvasSeed not in WebIDL"

      - name: Package
        run: |
          mkdir -p dist
          cp -r firefox-src/obj-*/dist/bin/* dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camoufox-hydra-linux-x86_64
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
