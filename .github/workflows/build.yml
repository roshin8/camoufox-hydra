name: Build Camoufox Hydra

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18 clang-18
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | bash -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y msitools p7zip-full aria2 nasm

      - name: Fetch Firefox source
        run: make fetch

      # Matches Camoufox's setup-minimal: extract, copy additions, NO git init
      - name: Setup source (Camoufox setup-minimal flow)
        run: |
          mkdir -p firefox-src
          tar -xJf firefox-146.0.1.source.tar.xz -C firefox-src --strip-components=1
          cp -r additions/* firefox-src/

      - name: Bootstrap build environment
        run: |
          cd firefox-src
          MOZBUILD_STATE_PATH=$HOME/.mozbuild ./mach --no-interactive bootstrap --application-choice=browser

      - name: Fix mach logging bug
        run: |
          python3 -c "
          content = open('firefox-src/python/mach/mach/logging.py').read()
          old = '        formatted_msg = record.msg.format(**getattr(record, \"params\", {}))'
          new = '        try:\n            formatted_msg = record.msg.format(**getattr(record, \"params\", {}))\n        except (KeyError, ValueError, IndexError):\n            formatted_msg = record.msg'
          content = content.replace(old, new)
          open('firefox-src/python/mach/mach/logging.py', 'w').write(content)
          "

      # Apply patches using patch -p1 (same as Camoufox's patch.py)
      - name: Apply patches
        run: |
          cd firefox-src
          for p in $(find ../patches/infra ../patches/fingerprint -name '*.patch' | sort -t/ -k4); do
            echo "Applying: $p"
            patch -p1 -i "$p"
          done

      - name: Copy config
        run: |
          mkdir -p firefox-src/distribution
          cp config/policies.json firefox-src/distribution/policies.json
          mkdir -p firefox-src/lw
          cp config/hydra.cfg firefox-src/lw/camoufox.cfg
          cp config/policies.json firefox-src/lw/policies.json
          cp config/local-settings.js firefox-src/lw/local-settings.js
          cp config/chrome.css firefox-src/lw/chrome.css
          cp config/properties.json firefox-src/lw/properties.json
          cp mozconfig.linux firefox-src/mozconfig

      - name: Build extension
        run: cd extension && npm ci && npm run build:prod

      - name: Create swap space
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build Firefox
        run: cd firefox-src && ./mach build

      - name: Verify build
        run: |
          ls -la firefox-src/obj-*/dist/bin/camoufox* || true
          echo "=== Checking C++ APIs ==="
          grep "setCanvasSeed" firefox-src/dom/webidl/Window.webidl && echo "FOUND" || echo "NOT FOUND"

      - name: Package
        run: |
          mkdir -p dist
          cp -r firefox-src/obj-*/dist/bin/* dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camoufox-hydra-linux-x86_64
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
