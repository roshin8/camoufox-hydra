name: Build Camoufox Hydra

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: macos
            arch: arm64
            os: macos-15
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up LLVM 18 (Linux only)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18 clang-18
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | bash -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y msitools p7zip-full aria2 nasm

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install aria2 nasm

      - name: Set up git identity
        run: |
          git config --global user.email "ci@camoufox-hydra"
          git config --global user.name "Camoufox Hydra CI"

      - name: Fetch source
        run: make fetch

      - name: Setup and bootstrap
        run: |
          make setup-minimal
          make mozbootstrap || true
          mkdir -p dist

      - name: Set up sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Prioritize action's sccache over bootstrap's
        run: echo "$(dirname $SCCACHE_PATH)" >> $GITHUB_PATH

      - name: Create swap space
        if: runner.os == 'Linux'
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build
        run: python3 ./multibuild.py --target ${{ matrix.target }} --arch ${{ matrix.arch }}

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camoufox-hydra-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
